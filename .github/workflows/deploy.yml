name: Deploy to App Engine

on:
  push:
    branches: [master]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      incoming: ${{ steps.filter.outputs.incoming }}
      dispatch: ${{ steps.filter.outputs.dispatch }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'dashboard/**'
              - 'shared/**'
            incoming:
              - 'incoming/**'
              - 'shared/**'
            dispatch:
              - 'dispatch.yaml'

  deploy-dashboard:
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/frontend/package-lock.json
      - uses: astral-sh/setup-uv@v6
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_AUTH }}
      - run: cd dashboard/frontend && npm ci && npm run build
      - run: make requirements
      - run: cp -r shared/ dashboard/shared/
      - uses: google-github-actions/deploy-appengine@v2
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT_ID }}
          working_directory: dashboard
          version: 1

  deploy-incoming:
    needs: changes
    if: needs.changes.outputs.incoming == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_AUTH }}
      - run: make requirements
      - run: cp -r shared/ incoming/shared/
      - uses: google-github-actions/deploy-appengine@v2
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT_ID }}
          working_directory: incoming
          version: 1

  deploy-dispatch:
    needs: changes
    if: needs.changes.outputs.dispatch == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_AUTH }}
      - run: gcloud app deploy dispatch.yaml --project=${{ secrets.GCLOUD_PROJECT_ID }} --quiet
