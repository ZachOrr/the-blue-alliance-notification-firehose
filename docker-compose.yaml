services:
  datastore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      gcloud beta emulators datastore start
      --project=test-project
      --host-port=0.0.0.0:8432
      --no-store-on-disk
    ports:
      - "8432:8432"

  dashboard:
    build: .
    command: python dashboard/main.py
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATASTORE_EMULATOR_HOST: datastore-emulator:8432
      GOOGLE_CLOUD_PROJECT: test-project
      GAE_ENV: localdev
    volumes:
      - .:/app
    depends_on:
      - datastore-emulator

  incoming:
    build: .
    command: python incoming/main.py
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      DATASTORE_EMULATOR_HOST: datastore-emulator:8432
      GOOGLE_CLOUD_PROJECT: test-project
      GAE_ENV: localdev
    volumes:
      - .:/app
    depends_on:
      - datastore-emulator
